<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Personal page of Syuhao — live time, beautiful design." />
  <title>Syuhao</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --accent:    #a78bfa;
      --accent2:   #38bdf8;
      --glow:      rgba(167, 139, 250, 0.45);
      --card-bg:   rgba(15, 15, 30, 0.55);
      --border:    rgba(167, 139, 250, 0.25);
    }

    html, body {
      height: 100%;
      font-family: 'Outfit', sans-serif;
      background: #060612;
      color: #e2e8f0;
      overflow: hidden;
    }

    /* ── Animated gradient background ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: radial-gradient(ellipse 80% 60% at 20% 30%, #1a0533 0%, transparent 60%),
                  radial-gradient(ellipse 70% 70% at 80% 70%, #0b1a40 0%, transparent 60%),
                  #060612;
    }

    /* Floating orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.55;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .orb1 {
      width: 520px; height: 520px;
      background: radial-gradient(circle, #7c3aed 0%, transparent 70%);
      top: -120px; left: -80px;
      animation-duration: 14s;
    }
    .orb2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #0ea5e9 0%, transparent 70%);
      bottom: -100px; right: -60px;
      animation-duration: 11s;
      animation-delay: -4s;
    }
    .orb3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #ec4899 0%, transparent 70%);
      top: 50%; left: 55%;
      opacity: 0.25;
      animation-duration: 17s;
      animation-delay: -7s;
    }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.08); }
    }

    /* Star field canvas */
    canvas#stars {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* ── Main card ── */
    .page {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border: 1px solid var(--border);
      border-radius: 2rem;
      padding: 4rem 5rem;
      text-align: center;
      max-width: 700px;
      width: 100%;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 8px 60px rgba(0,0,0,0.6),
        0 0 80px var(--glow);
      animation: cardIn 1s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(40px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    /* Avatar / monogram */
    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      margin: 0 auto 2rem;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -1px;
      color: #fff;
      box-shadow: 0 0 40px var(--glow);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 30px var(--glow); }
      50%       { box-shadow: 0 0 60px var(--glow), 0 0 100px rgba(56,189,248,0.25); }
    }

    /* Name */
    .name {
      font-size: clamp(3.5rem, 8vw, 6rem);
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 1;
      background: linear-gradient(135deg, #fff 20%, var(--accent) 55%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.4rem;
      animation: fadeUp 0.9s 0.2s cubic-bezier(0.22,1,0.36,1) both;
    }

    .tagline {
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(148,163,184,0.75);
      margin-bottom: 3rem;
      animation: fadeUp 0.9s 0.35s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Divider */
    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
      margin: 0 auto 3rem;
      border-radius: 2px;
      animation: fadeUp 0.9s 0.45s cubic-bezier(0.22,1,0.36,1) both;
    }

    /* Clock */
    .clock-wrap {
      animation: fadeUp 0.9s 0.55s cubic-bezier(0.22,1,0.36,1) both;
    }

    .clock-label {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(148,163,184,0.5);
      margin-bottom: 0.6rem;
    }

    #time {
      font-size: clamp(2.8rem, 7vw, 4.5rem);
      font-weight: 700;
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    #date {
      font-size: 1rem;
      font-weight: 300;
      color: rgba(148,163,184,0.7);
      margin-top: 0.7rem;
      letter-spacing: 0.06em;
    }

    /* Tick colon */
    .colon {
      animation: blink 1s step-end infinite;
      display: inline-block;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    /* Bottom row */
    .bottom {
      margin-top: 3rem;
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      animation: fadeUp 0.9s 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }

    .chip {
      padding: 0.45rem 1.2rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: rgba(148,163,184,0.8);
      background: rgba(255,255,255,0.04);
      transition: background 0.25s, color 0.25s, border-color 0.25s, box-shadow 0.25s;
      cursor: default;
    }
    .chip:hover {
      background: rgba(167,139,250,0.15);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 0 18px var(--glow);
    }

    /* Responsive */
    @media (max-width: 520px) {
      .card { padding: 3rem 2rem; }
    }
  </style>
</head>
<body>

  <!-- Background layer -->
  <div class="bg">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>
  <canvas id="stars"></canvas>

  <!-- Main content -->
  <main class="page">
    <article class="card">

      <div class="avatar" aria-hidden="true">SH</div>

      <h1 class="name">Syuhao</h1>
      <p class="tagline">Personal Space</p>

      <div class="divider"></div>

      <div class="clock-wrap">
        <p class="clock-label">Current Time</p>
        <div id="time" aria-live="polite" aria-label="Current time"></div>
        <div id="date"></div>
      </div>

      <div class="bottom">
        <span class="chip">✦ Deep Learning</span>
        <span class="chip">✦ AI Research</span>
        <span class="chip">✦ Builder</span>
      </div>

    </article>
  </main>

  <script>
    // ── Live clock ──────────────────────────────────────────────
    const timeEl = document.getElementById('time');
    const dateEl = document.getElementById('date');

    const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    function tick() {
      const now = new Date();
      const h  = String(now.getHours()).padStart(2, '0');
      const m  = String(now.getMinutes()).padStart(2, '0');
      const s  = String(now.getSeconds()).padStart(2, '0');
      timeEl.innerHTML = `${h}<span class="colon">:</span>${m}<span class="colon">:</span>${s}`;

      const day   = DAYS[now.getDay()];
      const month = MONTHS[now.getMonth()];
      const d     = now.getDate();
      const y     = now.getFullYear();
      dateEl.textContent = `${day}, ${month} ${d}, ${y}`;
    }

    tick();
    setInterval(tick, 1000);

    // ── Star field ──────────────────────────────────────────────
    const canvas = document.getElementById('stars');
    const ctx    = canvas.getContext('2d');

    let W, H, stars = [];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function createStars(n = 140) {
      stars = Array.from({ length: n }, () => ({
        x:  Math.random() * W,
        y:  Math.random() * H,
        r:  Math.random() * 1.4 + 0.2,
        a:  Math.random(),
        da: (Math.random() * 0.005 + 0.002) * (Math.random() < 0.5 ? 1 : -1),
      }));
    }

    function drawStars() {
      ctx.clearRect(0, 0, W, H);
      for (const s of stars) {
        s.a += s.da;
        if (s.a <= 0 || s.a >= 1) s.da *= -1;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.a.toFixed(3)})`;
        ctx.fill();
      }
      requestAnimationFrame(drawStars);
    }

    resize();
    createStars();
    drawStars();
    window.addEventListener('resize', () => { resize(); createStars(); });
  </script>
</body>
</html>
